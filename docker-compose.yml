# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#  Ground Control вЂ” Znuny dev stack
#  Networks: edge (cloudflaredв†”web) В· app (web/daemonв†”services)
#            data (INTERNAL: postgres/redis/opensearch)
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
name: ${COMPOSE_PROJECT_NAME:-ground-control}

networks:
  edge:
  app:
  data:
    internal: true

volumes:
  postgres-data:
  znuny-var:
  opensearch-data:

services:

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-znuny}
      POSTGRES_USER: ${POSTGRES_USER:-znuny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-znuny}
      # Znuny needs UTF8 + C-ish collation; keep template defaults.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      # PG18 Docker image stores data under a major-version subdir and
      # expects the volume at /var/lib/postgresql (NOT .../data).
      - postgres-data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks: [data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-znuny} -d ${POSTGRES_DB:-znuny}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - /data
    networks: [data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  opensearch:
    image: opensearchproject/opensearch:2
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-OpenSearch-Str0ng-Pass!}
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks: [data]
    healthcheck:
      # security plugin disabled for dev в†’ plain http on 9200
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  znuny-web:
    build:
      context: ./znuny
      args:
        ZNUNY_VERSION: ${ZNUNY_VERSION:-7.2.3}
    image: ground-control/znuny:${ZNUNY_VERSION:-7.2.3}
    restart: unless-stopped
    command: ["web"]
    environment:
      OTRS_HOME: /opt/otrs
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-znuny}
      POSTGRES_USER: ${POSTGRES_USER:-znuny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-znuny}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST:-opensearch}
      OPENSEARCH_PORT: ${OPENSEARCH_PORT:-9200}
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-OpenSearch-Str0ng-Pass!}
      ZNUNY_FQDN: ${ZNUNY_FQDN:-znuny-dev.was.dev.br}
      ZNUNY_SYSTEM_ID: ${ZNUNY_SYSTEM_ID:-10}
      ZNUNY_ADMIN_USER: ${ZNUNY_ADMIN_USER:-root@localhost}
      ZNUNY_ADMIN_PASSWORD: ${ZNUNY_ADMIN_PASSWORD:-changeme}
      # GertiAdmin webservice AccessToken (#1G-a, D19): reusa ZNUNY_WS_TOKEN
      # (mesmo segredo do sidecar). Vazio в†’ fail-closed. Nunca :? (D13).
      GERTI_ADMIN_WS_TOKEN: ${ZNUNY_WS_TOKEN:-}
      # GertiAgent webservice AccessToken (#1J): token SEPARADO p/ as 3 ops
      # de agente (mais poderosas). Vazio в†’ fail-closed. Nunca :? (D13).
      GERTI_AGENT_WS_TOKEN: ${ZNUNY_AGENT_WS_TOKEN:-}
      # Segredo HMAC do webhook de automaГ§ГЈo (#1Q): o Event module GertiAutomation
      # assina o corpo com ele; DEVE bater com gerti.znuny_instance.webhook_signing_secret_ref
      # (o sidecar verifica). SEGREDO вЂ” sГі em .env.prod (gitignored). Vazio в†’ nГЈo posta.
      GERTI_WEBHOOK_SIGNING_SECRET: ${GERTI_WEBHOOK_SIGNING_SECRET:-}
    volumes:
      - znuny-var:/opt/otrs/var
    ports:
      - "${ZNUNY_HTTP_PORT:-8080}:80"
    networks: [edge, app, data]
    depends_on:
      postgres:   { condition: service_healthy }
      redis:      { condition: service_healthy }
      opensearch: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/znuny/index.pl | grep -qi 'login' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  znuny-daemon:
    image: ground-control/znuny:${ZNUNY_VERSION:-7.2.3}
    restart: unless-stopped
    command: ["daemon"]
    environment:
      OTRS_HOME: /opt/otrs
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-znuny}
      POSTGRES_USER: ${POSTGRES_USER:-znuny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-znuny}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      OPENSEARCH_HOST: ${OPENSEARCH_HOST:-opensearch}
      OPENSEARCH_PORT: ${OPENSEARCH_PORT:-9200}
      ZNUNY_FQDN: ${ZNUNY_FQDN:-znuny-dev.was.dev.br}
      ZNUNY_SYSTEM_ID: ${ZNUNY_SYSTEM_ID:-10}
      ZNUNY_ADMIN_USER: ${ZNUNY_ADMIN_USER:-root@localhost}
      ZNUNY_ADMIN_PASSWORD: ${ZNUNY_ADMIN_PASSWORD:-changeme}
      # GertiAdmin webservice AccessToken (#1G-a, D19): reusa ZNUNY_WS_TOKEN.
      GERTI_ADMIN_WS_TOKEN: ${ZNUNY_WS_TOKEN:-}
      # GertiAgent webservice AccessToken (#1J): token SEPARADO p/ as 3 ops
      # de agente (mais poderosas). Vazio в†’ fail-closed. Nunca :? (D13).
      GERTI_AGENT_WS_TOKEN: ${ZNUNY_AGENT_WS_TOKEN:-}
      # Segredo HMAC do webhook de automaГ§ГЈo (#1Q): o Event module GertiAutomation
      # assina o corpo com ele; DEVE bater com gerti.znuny_instance.webhook_signing_secret_ref
      # (o sidecar verifica). SEGREDO вЂ” sГі em .env.prod (gitignored). Vazio в†’ nГЈo posta.
      GERTI_WEBHOOK_SIGNING_SECRET: ${GERTI_WEBHOOK_SIGNING_SECRET:-}
    volumes:
      - znuny-var:/opt/otrs/var
    networks: [app, data]
    depends_on:
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }
      znuny-web: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "su otrs -s /bin/bash -c 'cd /opt/otrs && bin/otrs.Daemon.pl status' | grep -qi running"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Token-mode tunnel for hostname znuny-dev.was.dev.br. Until the
    # user pastes a REAL connector token into .env.prod, cloudflared
    # fails to authenticate and restarts вЂ” this is expected and does
    # NOT break the rest of the stack (no service depends on it).
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "run"
      - "--token"
      - "${CLOUDFLARE_TUNNEL_TOKEN:-MISSING_TOKEN}"
    networks: [edge]
    depends_on:
      znuny-web: { condition: service_started }

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #  Gerti sidecar (Spec #1C) вЂ” profile `gerti` ONLY.
  #  Aditivo: um `docker compose ... up` SEM `--profile gerti` NГѓO sobe
  #  nenhum destes serviГ§os; a stack Znuny fica intocada (Postgres nГЈo
  #  reinicia, nenhum container Znuny Г© reconstruГ­do). Single-cluster:
  #  schema `gerti` no MESMO postgres:18 do Znuny (Spec #0).
  #  Deploy runbook: docs/superpowers/plans/2026-05-17-spec-1c-deploy.md
  #  + .ia/OPS.md "Deploy do sidecar".
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  # D1 вЂ” one-shot idempotente: cria schema `gerti` + roles + RLS no
  # cluster Postgres VIVO, como o superusuГЎrio. Re-rodГЎvel (sГі re-assere
  # roles/grants e reaplica senhas). NUNCA toca public/znuny do Znuny.
  gerti-db-init:
    profiles: ["gerti"]
    image: ${POSTGRES_IMAGE:-postgres:18}
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [data]
    # Segredos passados via environment c/ default vazio (NUNCA `:?` no
    # nГ­vel compose: ele interpola o arquivo INTEIRO antes de filtrar
    # profiles в†’ `:?` quebraria um `make up` sГі-Znuny). O enforcement
    # "deve estar setado" Г© em RUNTIME, no shell do container (`$$` =
    # `$` literal p/ o compose в†’ o bash lГЄ do env real do container).
    environment:
      PGHOST: ${POSTGRES_HOST:-postgres}
      PGPORT: ${POSTGRES_PORT:-5432}
      PGDATABASE: ${POSTGRES_DB:-znuny}
      PGUSER: ${POSTGRES_USER:-znuny}
      PGPASSWORD: ${POSTGRES_PASSWORD:-znuny}
      GERTI_SIDECAR_DB_PASSWORD: ${GERTI_SIDECAR_DB_PASSWORD:-}
      GERTI_ADMIN_DB_PASSWORD: ${GERTI_ADMIN_DB_PASSWORD:-}
    volumes:
      - ./postgres/gerti-init:/gerti-init:ro
    entrypoint: ["bash", "-c"]
    command:
      - >
        : "$${GERTI_SIDECAR_DB_PASSWORD:?GERTI_SIDECAR_DB_PASSWORD ausente вЂ” defina em .env.prod na VPS}";
        : "$${GERTI_ADMIN_DB_PASSWORD:?GERTI_ADMIN_DB_PASSWORD ausente вЂ” defina em .env.prod na VPS}";
        exec psql -v ON_ERROR_STOP=1
        -v sidecar_pw="'$${GERTI_SIDECAR_DB_PASSWORD}'"
        -v admin_pw="'$${GERTI_ADMIN_DB_PASSWORD}'"
        -f /gerti-init/001_gerti_schema_roles.sql

  # D2.1 вЂ” Alembic como gerti_admin_user (BYPASSRLS, dono do DDL); sai 0.
  sidecar-migrate:
    profiles: ["gerti"]
    build: { context: ./apps/sidecar, target: prod }
    image: ground-control/sidecar:${GERTI_SIDECAR_VERSION:-dev}
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [data]
    environment:
      DATABASE_URL: postgresql+asyncpg://gerti_admin_user:${GERTI_ADMIN_DB_PASSWORD:-}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-znuny}
    command: ["uv", "run", "alembic", "upgrade", "head"]

  # D2.2 вЂ” app long-running como gerti_sidecar (RLS-subject, sem
  # BYPASSRLS); sГі aceita trГЎfego apГіs migrate concluir com sucesso.
  sidecar:
    profiles: ["gerti"]
    build: { context: ./apps/sidecar, target: prod }
    image: ground-control/sidecar:${GERTI_SIDECAR_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:        { condition: service_healthy }
      sidecar-migrate: { condition: service_completed_successfully }
    networks: [data, edge, app]
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://gerti_sidecar:${GERTI_SIDECAR_DB_PASSWORD:-}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-znuny}
      LOG_LEVEL: INFO
      SESSION_SECRET: ${GERTI_SESSION_SECRET:-}
      # Caminho BYPASSRLS estreito SГ“ p/ resoluГ§ГЈo subdomГ­nio->tenant
      # (D16). Mesmo host/db do DATABASE_URL, role gerti_admin_user.
      DATABASE_ADMIN_URL: postgresql+asyncpg://gerti_admin_user:${GERTI_ADMIN_DB_PASSWORD:-}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-znuny}
      # Webservice Znuny GertiCustomerAuth p/ znuny_gi (D14). Valores
      # reais em .env.prod na VPS; default vazio (nunca :? вЂ” D13).
      ZNUNY_WS_URL: ${ZNUNY_WS_URL:-}
      ZNUNY_WS_TOKEN: ${ZNUNY_WS_TOKEN:-}
      # Webservice Znuny GertiAdmin p/ o write-client de onboarding (#1G-a,
      # D19): base atГ© .../Webservice/GertiAdmin; o token reusa ZNUNY_WS_TOKEN
      # (mesmo AccessToken cfg key GertiAdmin::AccessToken no Znuny). Default
      # vazio (nunca :? вЂ” D13); valor real em .env.prod na VPS.
      ZNUNY_ADMIN_WS_URL: ${ZNUNY_ADMIN_WS_URL:-}
      # Webservice Znuny GertiTicket p/ o cliente de ticket (#1E): base atГ©
      # .../Webservice/GertiTicket; mesmo AccessToken (ZNUNY_WS_TOKEN). Default
      # vazio вЂ” o cliente deriva de ZNUNY_ADMIN_WS_URL (/GertiAdminв†’/GertiTicket)
      # quando ausente (nunca :? вЂ” D13); valor real em .env.prod na VPS.
      ZNUNY_TICKET_WS_URL: ${ZNUNY_TICKET_WS_URL:-}
      # Token SEPARADO p/ as 3 ops de agente #1J (TimeAccountingAdd/
      # AgentTicketSearch/AgentTicketGet в†’ GertiAgent::AccessToken no Znuny).
      # Mais poderoso que o token customer #1E; default vazio (nunca :? вЂ” D13).
      ZNUNY_AGENT_WS_TOKEN: ${ZNUNY_AGENT_WS_TOKEN:-}
      # IA (#1N) вЂ” motor Ollama Cloud (gpt-oss:120b). Feature opt-in: sem chave
      # ou AI_FEATURES_ENABLED!=true => endpoints 404 e painel some (kill-switch).
      # OLLAMA_API_KEY Г© SEGREDO: sГі em .env.prod na VPS (nunca commitar вЂ” D13).
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama.com}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:120b}
      AI_FEATURES_ENABLED: ${AI_FEATURES_ENABLED:-false}
      # ContrataГ§ГЈo + Asaas (Spec #2) вЂ” feature opt-in. Sem ASAAS_ENABLED=true
      # ou sem chave => /v1/checkout responde 404 (fail-safe, kill-switch).
      # ASAAS_API_KEY/WEBHOOK_TOKEN sГЈo SEGREDOS: sГі em .env.prod (nunca commitar).
      ASAAS_ENABLED: ${ASAAS_ENABLED:-false}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api-sandbox.asaas.com/v3}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      CHECKOUT_PUBLIC_BASE_URL: ${CHECKOUT_PUBLIC_BASE_URL:-https://contratar.was.dev.br}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  #  Worker de consumo/fechamento (Spec #1B) вЂ” profile `gerti`.
  #  Mesma imagem do sidecar, command proprio. Reconcilia time_accounting
  #  do Znuny -> consumption_event (idempotente) e fecha ciclos vencidos.
  # в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  sidecar-worker:
    profiles: ["gerti"]
    build: { context: ./apps/sidecar, target: prod }
    image: ground-control/sidecar:${GERTI_SIDECAR_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:        { condition: service_healthy }
      sidecar-migrate: { condition: service_completed_successfully }
    networks: [data, edge, app]
    # O worker nГЈo expГµe HTTP вЂ” desabilita o HEALTHCHECK (curl :8001) herdado
    # da imagem do sidecar, que jamais passaria e marcaria o serviГ§o unhealthy.
    # Liveness do worker = restart: unless-stopped + o loop asyncio.
    healthcheck:
      disable: true
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://gerti_sidecar:${GERTI_SIDECAR_DB_PASSWORD:-}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-znuny}
      LOG_LEVEL: INFO
      SESSION_SECRET: ${GERTI_SESSION_SECRET:-}
      DATABASE_ADMIN_URL: postgresql+asyncpg://gerti_admin_user:${GERTI_ADMIN_DB_PASSWORD:-}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-znuny}
      ZNUNY_WS_URL: ${ZNUNY_WS_URL:-}
      ZNUNY_WS_TOKEN: ${ZNUNY_WS_TOKEN:-}
      ZNUNY_ADMIN_WS_URL: ${ZNUNY_ADMIN_WS_URL:-}
      ZNUNY_TICKET_WS_URL: ${ZNUNY_TICKET_WS_URL:-}
      RECONCILE_INTERVAL_SECONDS: ${RECONCILE_INTERVAL_SECONDS:-120}
      TIME_UNIT_TO_MINUTES: ${TIME_UNIT_TO_MINUTES:-1}
    command: ["uv", "run", "python", "-m", "gerti_sidecar.jobs.worker"]

