# Front door: acessar a raiz do host vai direto pra plataforma (interface
# do agente), sem precisar digitar /znuny/index.pl.
#
# Atrás do Cloudflare Tunnel o Apache recebe a request em HTTP puro (o TLS
# termina na edge da Cloudflare). O mod_alias (RedirectMatch) monta o
# Location pelo scheme da conexão → emitiria http://, causando hop extra.
# Este host só é acessível via Cloudflare (sempre https), então emitimos
# o Location https:// explicitamente via mod_rewrite, host-agnóstico.
RewriteEngine On
RewriteRule ^/?$ https://%{HTTP_HOST}/znuny/index.pl [R=302,L]
