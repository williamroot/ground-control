# Front door: acessar a raiz do host vai direto pra plataforma (interface
# do agente), sem precisar digitar /znuny/index.pl.
#
# Atrás do Cloudflare Tunnel o Apache recebe a request em HTTP (TLS é
# terminado na edge). Sem isto o RedirectMatch emitiria Location http://…,
# causando um hop extra / aviso de inseguro. Confiar no X-Forwarded-Proto
# faz o Apache montar o Location como https:// corretamente.
SetEnvIf X-Forwarded-Proto "https" HTTPS=on

RedirectMatch 302 ^/$ /znuny/index.pl
