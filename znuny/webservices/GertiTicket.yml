# znuny/webservices/GertiTicket.yml
---
Debugger:
  DebugThreshold: error
  TestMode: '0'
Description: Gerti portal ticketing (#1E) — Create/Search/Get/Reply/FormMeta via GI
FrameworkVersion: 7.2.x
Provider:
  Operation:
    TicketCreate:
      Description: Open a customer ticket linked to a contract (Gerti custom op)
      Type: GertiTicket::TicketCreate
    TicketSearch:
      Description: List customer tickets (own/company)
      Type: GertiTicket::TicketSearch
    TicketGet:
      Description: Ticket detail + customer-visible articles (ownership-guarded)
      Type: GertiTicket::TicketGet
    TicketReply:
      Description: Customer reply to an existing ticket
      Type: GertiTicket::TicketReply
    FormMeta:
      Description: Services/priorities/types for the open-ticket form
      Type: GertiTicket::FormMeta
    TimeAccountingSince:
      Description: Read native time_accounting rows since a cursor (Spec #1B)
      Type: GertiTicket::TimeAccountingSince
    TimeAccountingAdd:
      Description: Log a time_accounting entry for an agent (Spec #1J)
      Type: GertiTicket::TimeAccountingAdd
    AgentTicketSearch:
      Description: Agent-side ticket search (no customer scope)
      Type: GertiTicket::AgentTicketSearch
    AgentTicketGet:
      Description: Agent-side ticket detail
      Type: GertiTicket::AgentTicketGet
    AgentTicketUpdate:
      Description: Apply queue/state/priority/owner + internal note (Spec #1Q automation)
      Type: GertiTicket::AgentTicketUpdate
    ConfigItemSearch:
      Description: Search ITSM Config Items scoped by CustomerID (Spec #1K)
      Type: GertiTicket::ConfigItemSearch
    ConfigItemGet:
      Description: ITSM Config Item detail (ownership-guarded, Spec #1K)
      Type: GertiTicket::ConfigItemGet
    TicketStats:
      Description: Aggregated ticket counts scoped by CustomerID (Spec #1O)
      Type: GertiTicket::TicketStats
  Transport:
    Config:
      KeepAlive: ''
      MaxLength: '200000000'
      RouteOperationMapping:
        TicketCreate:
          RequestMethod:
          - POST
          Route: /Ticket
        TicketSearch:
          RequestMethod:
          - POST
          Route: /Ticket/Search
        TicketGet:
          RequestMethod:
          - POST
          Route: /Ticket/Get
        TicketReply:
          RequestMethod:
          - POST
          Route: /Ticket/Reply
        FormMeta:
          RequestMethod:
          - POST
          Route: /FormMeta
        TimeAccountingSince:
          RequestMethod:
          - POST
          Route: /TimeAccounting/Since
        TimeAccountingAdd:
          RequestMethod:
          - POST
          Route: /TimeAccounting/Add
        AgentTicketSearch:
          RequestMethod:
          - POST
          Route: /Agent/Ticket/Search
        AgentTicketGet:
          RequestMethod:
          - POST
          Route: /Agent/Ticket/Get
        AgentTicketUpdate:
          RequestMethod:
          - POST
          Route: /Agent/Ticket/Update
        ConfigItemSearch:
          RequestMethod:
          - POST
          Route: /ConfigItem/Search
        ConfigItemGet:
          RequestMethod:
          - POST
          Route: /ConfigItem/Get
        TicketStats:
          RequestMethod:
          - POST
          Route: /Ticket/Stats
    Type: HTTP::REST
RemoteSystem: ''
